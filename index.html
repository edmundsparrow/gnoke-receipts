<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gnoke Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="global.png">
<link rel="apple-touch-icon" href="global.png">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f2ec; --text:#1c140e; --muted:#a09080;
  --accent:#2a7a52; --border:#ede4d8; --surface:#fff;
  --font-sans:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --font-display:'Playfair Display',serif;
}
html,body{width:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;overflow:hidden}

.bg-layer{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 70% 85%, color-mix(in srgb,var(--accent) 10%,transparent) 0%,transparent 60%),
    radial-gradient(ellipse at 15% 20%, color-mix(in srgb,var(--accent) 5%,transparent) 0%,transparent 50%);
}
.page{position:relative;z-index:1;width:100%;height:100dvh;display:flex;flex-direction:column;justify-content:space-between;padding:52px 28px 44px}

.version{position:absolute;top:52px;right:28px;font-family:var(--font-mono);font-size:.6rem;letter-spacing:.1em;color:var(--muted);opacity:0;animation:up .5s ease .05s forwards}

.top{display:flex;flex-direction:column;gap:6px;opacity:0;animation:up .5s ease .1s forwards}
.gnoke-label{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.24em;text-transform:uppercase;color:var(--accent)}
.app-name{font-family:var(--font-display);font-size:2.8rem;font-weight:700;letter-spacing:-.03em;line-height:1;color:var(--text)}

.mid{display:flex;flex-direction:column;gap:28px;opacity:0;animation:up .5s ease .25s forwards}
.desc{font-size:.97rem;font-weight:300;color:var(--muted);line-height:1.7;max-width:300px}
.desc strong{color:var(--text);font-weight:600}

.pillars{display:flex;gap:8px}
.pillar{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 10px;display:flex;flex-direction:column;gap:6px;box-shadow:0 2px 8px rgba(30,20,10,.05)}
.pillar-icon{font-size:1.15rem;line-height:1}
.pillar-label{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

.bottom{display:flex;flex-direction:column;gap:14px;opacity:0;animation:up .5s ease .4s forwards}
.enter-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:var(--accent);color:#fff;font-family:var(--font-sans);font-size:.92rem;font-weight:600;border:none;border-radius:11px;cursor:pointer;text-decoration:none;transition:opacity .15s,transform .15s,filter .2s;letter-spacing:.01em}
.enter-btn:active{opacity:.88;transform:scale(.98)}
.enter-btn:hover{filter:brightness(.9)}
.arrow{transition:transform .2s;display:inline-block}
.enter-btn:hover .arrow{transform:translateX(4px)}

.skip-row{display:flex;align-items:center;justify-content:center;gap:8px}
.skip-row input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.skip-row label{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;user-select:none}

body.out{animation:fadeOut .28s ease forwards}
@keyframes fadeOut{to{opacity:0}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<span class="version">v1.0</span>

<div class="page">
  <div class="top">
    <span class="gnoke-label">Gnoke</span>
    <span class="app-name">Ledger</span>
  </div>

  <div class="mid">
    <p class="desc">
      Professional receipts for every sale.
      Built for <strong>traders, retailers &amp; small businesses.</strong>
      No server. No account.
    </p>
    <div class="pillars">
      <div class="pillar"><span class="pillar-icon">🧾</span><span class="pillar-label">Receipts</span></div>
      <div class="pillar"><span class="pillar-icon">📋</span><span class="pillar-label">History</span></div>
      <div class="pillar"><span class="pillar-icon">🖨️</span><span class="pillar-label">Print-Ready</span></div>
    </div>
  </div>

  <div class="bottom">
    <a class="enter-btn" href="receipt.html" id="cta-btn">
      Open Ledger <span class="arrow">→</span>
    </a>
    <div class="skip-row">
      <input type="checkbox" id="skip">
      <label for="skip">Don't show again</label>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script>
const KEY = 'gnoke_ledger_skip';

async function boot() {
  // Check skip
  if (localStorage.getItem(KEY) === '1') {
    await redirect();
    return;
  }
  // Wire CTA
  document.getElementById('cta-btn').addEventListener('click', async (e) => {
    e.preventDefault();
    if (document.getElementById('skip').checked) localStorage.setItem(KEY, '1');
    document.body.classList.add('out');
    setTimeout(async () => { await redirect(); }, 280);
  });
}

async function redirect() {
  try {
    await DB.init();
    const name = DB.getBusiness('company_name');
    window.location.replace(name ? 'receipt.html' : 'setup.html');
  } catch(e) {
    window.location.replace('setup.html');
  }
}

boot();
</script>
</body>
</html>
